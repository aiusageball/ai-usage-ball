<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pulse · Apple Watch 全屏铺满</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0; background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    color: #e7e7ea; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    gap: 24px; padding: 38px 0 60px;
  }
  h1 { font-size: 15px; font-weight: 600; opacity: .75; margin: 0; }
  .note { font-size: 12px; opacity: .5; max-width: 480px; text-align: center; line-height: 1.65; }
  .note b { color:#ffb86b; }
  .row { display: flex; gap: 46px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .caption { font-size: 12px; opacity: .6; }

  .watch {
    width: 198px; height: 242px; background: #000; border-radius: 46px;
    box-shadow: 0 0 0 8px #1c1c1e, 0 0 0 10px #2c2c2e, 0 22px 50px rgba(0,0,0,.7);
    position: relative; overflow: hidden;
  }
  .topbar {
    position: absolute; top: 9px; left: 0; right: 0; z-index: 5;
    display: flex; justify-content: space-between; padding: 0 24px;
    font-size: 12px; opacity: .7;
  }
  .topbar .time { color:#fff; font-weight:600; }

  /* ── 全屏铺满的球(贴近边缘,像自带表盘)── */
  .orb {
    position: absolute; left: 50%; top: 50%;
    width: 226px; height: 226px;           /* 比屏幕略大,环贴边/微出血 */
    transform: translate(-50%, -50%);
  }
  .orb .glass {
    position: absolute; inset: 0; border-radius: 50%; overflow: hidden;
    background:
      radial-gradient(circle at 38% 28%, rgba(255,255,255,.10), rgba(255,255,255,0) 44%),
      radial-gradient(circle at 50% 55%, #131318 0%, #0b0b0f 72%, #08080b 100%);
    box-shadow: inset 0 0 48px rgba(0,0,0,.92), inset 0 0 14px rgba(255,255,255,.16),
      inset 0 -24px 50px rgba(255,255,255,.09);
  }
  .orb .liquid {
    position: absolute; inset: 0; width: 226px; height: 226px; object-fit: cover;
    -webkit-mask-image: radial-gradient(circle, #000 60%, transparent 78%);
    mask-image: radial-gradient(circle, #000 60%, transparent 78%);
    transform-origin: center center;
  }
  .orb svg.rings { position: absolute; inset: 0; width:226px; height:226px; }
  .orb .specular {
    position:absolute; top:24px; left:42px; width:78px; height:40px;
    background: radial-gradient(ellipse at center, rgba(255,255,255,.4), rgba(255,255,255,0) 70%);
    border-radius:50%; filter: blur(3px); pointer-events:none;
  }
  .orb .timer {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; pointer-events:none;
  }
  .timer .big { font-size: 38px; font-weight: 600; color:#fff;
    text-shadow: 0 0 16px #ff8c00; font-variant-numeric: tabular-nums; letter-spacing:.01em; }
  .timer .sub { font-size: 14px; margin-top:3px; color:#facc15;
    text-shadow:0 0 9px #facc15; font-variant-numeric: tabular-nums; }
  .timer .name { font-size: 11px; letter-spacing:.16em; font-weight:700;
    color:#ff8c00; opacity:.85; margin-bottom: 4px; }
  .timer .left { font-size: 11px; opacity:.6; margin-top: 5px; letter-spacing:.04em; }

  /* 表盘静态版 */
  .face { width:198px;height:242px;border-radius:46px;overflow:hidden;background:#000;
    box-shadow:0 0 0 8px #1c1c1e,0 0 0 10px #2c2c2e,0 22px 50px rgba(0,0,0,.7);position:relative;}
  .face .clock{position:absolute;top:20px;left:22px;font-size:30px;font-weight:700;color:#fff;}
  .face .mini{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);width:108px;height:108px;}
  .face .mini .glass{position:absolute;inset:0;border-radius:50%;overflow:hidden;
    background:radial-gradient(circle at 50% 55%,#131318,#08080b);
    box-shadow:inset 0 0 24px rgba(0,0,0,.9),inset 0 0 8px rgba(255,255,255,.15);}
  .face .mini img{position:absolute;inset:0;width:108px;height:108px;object-fit:cover;
    -webkit-mask-image:radial-gradient(circle,#000 60%,transparent 78%);
    mask-image:radial-gradient(circle,#000 60%,transparent 78%);}
  .face .mini svg{position:absolute;inset:0;width:108px;height:108px;}
  .face .mini .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:20px;font-weight:600;color:#fff;text-shadow:0 0 10px #ff8c00;}
  .face .clabel{position:absolute;bottom:16px;left:0;right:0;text-align:center;font-size:10.5px;}
  .face .clabel .t{color:#ff8c00;font-weight:700;}
  .face .clabel .p{opacity:.65;}
</style>
</head>
<body>
  <h1>AI Pulse — Apple Watch 全屏铺满(真实液体)</h1>
  <div class="note">
    球放大到<b>贴近屏幕边缘、微出血</b>,像手表自带表盘那样占满整块屏;环、液体、倒计时一起放大。<br>
    左 = 打开 App(真实液体在流);右 = 表盘小组件(静态一帧)。
  </div>

  <div class="row">
    <div class="stage">
      <div class="watch">
        <div class="topbar"><span class="time">9:41</span><span>􀙇 91%</span></div>
        <div class="orb">
          <div class="glass">
            <video class="liquid" id="liq" src="liquid-loop.mp4" autoplay loop muted playsinline></video>
          </div>
          <svg class="rings" viewBox="0 0 200 200">
            <defs><filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="3" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/>
            </filter></defs>
            <!-- 外环贴近视口边缘 r≈96 -->
            <circle cx="100" cy="100" r="96" stroke="#ff8c00" opacity=".30" stroke-width="1" fill="none"/>
            <circle cx="100" cy="100" r="91" stroke="#ff8c00" opacity=".5" stroke-width="3" fill="none"/>
            <circle cx="100" cy="100" r="80" stroke="#ff8c00" opacity=".20" stroke-width="7" fill="none"/>
            <circle id="ringMain" cx="100" cy="100" r="80" stroke="#ff8c00" stroke-width="7" fill="none"
              stroke-linecap="round" transform="rotate(-90 100 100)" filter="url(#glow)"/>
            <circle cx="100" cy="100" r="64" stroke="#facc15" opacity=".14" stroke-width="5" fill="none"/>
            <circle id="ringSec" cx="100" cy="100" r="64" stroke="#facc15" stroke-width="5" fill="none"
              opacity=".7" stroke-linecap="round" transform="rotate(-90 100 100)" filter="url(#glow)"/>
          </svg>
          <div class="specular"></div>
          <div class="timer">
            <span class="name">CLAUDE</span>
            <span class="big" id="cd">4:09:18</span>
            <span class="sub">WEEK 42%</span>
            <span class="left">55% left · 5h</span>
          </div>
        </div>
      </div>
      <div class="caption">▶ 打开 App · 全屏铺满</div>
    </div>

    <div class="stage">
      <div class="face">
        <div class="clock">9:41</div>
        <div class="mini">
          <div class="glass"><img src="liquid-frame.png" alt=""></div>
          <svg viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="86" stroke="#ff8c00" opacity=".22" stroke-width="10" fill="none"/>
            <circle id="ringFace" cx="100" cy="100" r="86" stroke="#ff8c00" stroke-width="10" fill="none"
              stroke-linecap="round" transform="rotate(-90 100 100)"/>
          </svg>
          <div class="pct">55%</div>
        </div>
        <div class="clabel"><span class="t">CLAUDE</span> <span class="p">55% left · ↻4h09</span></div>
      </div>
      <div class="caption">⊙ 表盘 complication(静态)</div>
    </div>
  </div>

<script>
const C = 2*Math.PI, sessionLeft = 55, weeklyLeft = 42;
function setRing(id,r,pct){const e=document.getElementById(id),c=C*r;
  e.setAttribute("stroke-dasharray",c); e.setAttribute("stroke-dashoffset",c-c*pct/100);}
setRing("ringMain",80,sessionLeft); setRing("ringSec",64,weeklyLeft); setRing("ringFace",86,sessionLeft);

const liq = document.getElementById("liq");
liq.style.transform = "scale(" + Math.max(0.01, sessionLeft/100) + ")";
liq.style.opacity = Math.min(1, sessionLeft/8);

let secs = 4*3600+9*60+18;
const fmt=s=>{const h=s/3600|0,m=s%3600/60|0,x=s%60;
  return h>0?`${h}:${String(m).padStart(2,'0')}:${String(x).padStart(2,'0')}`:`${m}:${String(x).padStart(2,'0')}`;};
setInterval(()=>{if(secs>0)secs--;document.getElementById("cd").textContent=fmt(secs);},1000);
</script>
</body>
</html>
